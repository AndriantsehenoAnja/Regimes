<script>

function saveRetour(){

    let poids =
    document.getElementById(
        "poidsObjectif"
    ).value;

    let xhr = new XMLHttpRequest();

    xhr.open("POST","save.php",true);

    xhr.setRequestHeader(
        "Content-type",
        "application/x-www-form-urlencoded"
    );

    xhr.onload = function(){

        window.location = "programme1.php";

    }

    xhr.send(
        "poidsObjectif="+poids
    );

}

function choisir(id){

    let poids =
    document.getElementById(
        "poidsObjectif"
    ).value;

    let xhr = new XMLHttpRequest();

    xhr.open("POST","save.php",true);

    xhr.setRequestHeader(
        "Content-type",
        "application/x-www-form-urlencoded"
    );

    xhr.onload = function(){

        window.location = "confirmation.php";

    }

    xhr.send(
        "regime_id="+id+
        "&poidsObjectif="+poids
    );

}

</script>
